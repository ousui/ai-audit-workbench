schema_version: "recipes-0.1.0"

description: >
  Deterministic static discovery recipes. Recipes generate candidates only.
  They must not create final FIND results directly.

recipes:
  - recipe_id: "SECRET_KEYWORD"
    title: "疑似敏感信息关键字"
    risk_type: "sensitive_information"
    severity_hint: "P1"
    confidence_hint: "medium"
    source: "static_pattern"
    include_exts:
      - ".env"
      - ".properties"
      - ".yml"
      - ".yaml"
      - ".json"
      - ".js"
      - ".ts"
      - ".java"
      - ".go"
      - ".php"
      - ".py"
      - ".dart"
      - ".swift"
      - ".kt"
    patterns:
      - "password"
      - "passwd"
      - "pwd"
      - "secret"
      - "api_key"
      - "apikey"
      - "access_key"
      - "private_key"
      - "token"
      - "jwt"
    negative_evidence_required:
      - "是否只是变量名、注释、示例或测试数据"
      - "是否包含真实值或可用凭据"
      - "是否已通过环境变量、密钥管理或配置中心注入"
      - "如为真实密钥，是否已轮换"

  - recipe_id: "ENV_FILE_TRACKED"
    title: "环境配置文件纳入审计范围"
    risk_type: "configuration_exposure"
    severity_hint: "P2"
    confidence_hint: "medium"
    source: "static_pattern"
    filename_patterns:
      - "^\\.env(\\..*)?$"
    patterns:
      - ".*"
    negative_evidence_required:
      - "文件是否仅包含模板占位符"
      - "文件是否为 example/sample 模板"
      - "是否含真实环境地址、账号、密钥或 Token"

  - recipe_id: "SQL_DYNAMIC_CONSTRUCTION"
    title: "疑似动态 SQL 构造"
    risk_type: "sql_injection_candidate"
    severity_hint: "P1"
    confidence_hint: "medium"
    source: "static_pattern"
    include_exts:
      - ".go"
      - ".java"
      - ".xml"
      - ".php"
      - ".py"
      - ".js"
      - ".ts"
    patterns:
      - "fmt.Sprintf"
      - "whereRaw"
      - "DB::raw"
      - "createNativeQuery"
      - "Statement"
      - "${"
      - "ORDER BY"
    negative_evidence_required:
      - "参数是否来自用户输入"
      - "是否使用参数化查询"
      - "动态字段是否有白名单"
      - "是否仅为内部固定枚举"

  - recipe_id: "FILE_IO_SURFACE"
    title: "文件上传下载或路径处理入口"
    risk_type: "file_io_candidate"
    severity_hint: "P2"
    confidence_hint: "medium"
    source: "static_pattern"
    include_exts:
      - ".go"
      - ".java"
      - ".php"
      - ".py"
      - ".js"
      - ".ts"
      - ".dart"
      - ".swift"
      - ".kt"
    patterns:
      - "upload"
      - "download"
      - "MultipartFile"
      - "FormFile"
      - "FileOutputStream"
      - "filepath.Join"
      - "readFile"
      - "writeFile"
    negative_evidence_required:
      - "是否校验扩展名白名单"
      - "是否校验文件大小和类型"
      - "是否规范化路径并校验最终目录前缀"
      - "是否避免使用原始文件名作为存储名"

  - recipe_id: "FRONTEND_STORAGE"
    title: "前端或客户端本地存储线索"
    risk_type: "client_storage_candidate"
    severity_hint: "P2"
    confidence_hint: "medium"
    source: "static_pattern"
    include_exts:
      - ".js"
      - ".ts"
      - ".tsx"
      - ".jsx"
      - ".vue"
      - ".dart"
      - ".swift"
      - ".kt"
      - ".java"
    patterns:
      - "localStorage"
      - "sessionStorage"
      - "document.cookie"
      - "shared_preferences"
      - "SharedPreferences"
      - "UserDefaults"
    negative_evidence_required:
      - "是否存储 Token、密码、身份标识或敏感业务数据"
      - "是否仅存储非敏感 UI 状态"
      - "是否使用 HttpOnly Cookie、Keychain、Keystore 或安全存储替代"

  - recipe_id: "BUSINESS_HIGH_RISK_KEYWORD"
    title: "高风险业务模块关键字"
    risk_type: "business_logic_review_candidate"
    severity_hint: "P2"
    confidence_hint: "low"
    source: "static_pattern"
    include_exts:
      - ".go"
      - ".java"
      - ".php"
      - ".py"
      - ".js"
      - ".ts"
      - ".vue"
      - ".dart"
      - ".swift"
      - ".kt"
    patterns:
      - "payment"
      - "pay"
      - "wallet"
      - "withdraw"
      - "refund"
      - "coupon"
      - "order"
      - "callback"
      - "notify"
      - "webhook"
      - "balance"
      - "tenant"
    negative_evidence_required:
      - "是否涉及资金、订单、状态流转或多租户隔离"
      - "是否已存在服务端归属校验"
      - "是否已存在签名校验、幂等控制或状态机约束"
