schema_version: project-doc-fields-0.2.0
status: draft

source_priority:
  - human_current_run_confirmation
  - current_code_manifest
  - current_tool_evidence
  - ai_inference_from_current_code
  - ai_extract_from_current_docs
  - local_registry_history
  - stale_or_unknown_docs

confidence_values:
  high: 高置信
  medium: 中置信
  low: 低置信
  unknown: 未知

source_types:
  human_current_run_confirmation: 本轮人工确认
  current_code_manifest: 当前代码清单或 manifest 事实
  current_tool_evidence: 当前工具执行证据
  ai_inference_from_current_code: AI 基于当前代码推理
  ai_extract_from_current_docs: AI 从当前项目文档提取
  local_registry_history: 本地索引库历史记录
  stale_or_unknown_docs: 可能过期或来源不明确的文档

field_record_shape:
  required: [field_id, label_zh, value, source_type, confidence]
  optional: [source_file, evidence_excerpt, verified_by_human, last_verified_commit, last_seen_at, notes]

fields:
  project_code: {label_zh: 项目代码, stability: stable}
